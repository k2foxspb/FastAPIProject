<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перенаправление в приложение...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 { font-size: 24px; margin-bottom: 12px; }
        p { color: var(--text-secondary); margin-bottom: 30px; }

        .btn {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:hover { background: var(--accent-hover); }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Перенаправляем в приложение</h1>
        <p>Если приложение не открылось автоматически, нажмите кнопку ниже.</p>
        <a id="redirect-link" class="btn" href="#">Открыть приложение</a>
    </div>

    <script>
        const scheme = "fokinfun://login";
        const queryParams = window.location.search;
        const deepLink = scheme + queryParams;
        
        // Update the button link
        document.getElementById("redirect-link").href = deepLink;

        // Try to redirect automatically
        window.location.replace(deepLink);

        // Fallback for some browsers: if still here after a delay
        setTimeout(() => {
            window.location.href = deepLink;
        }, 1000);
    </script>
</body>
</html>
